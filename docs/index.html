<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>add-weekday sample</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 840px;
        margin: 0 auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(15, 23, 42, 0.08);
      }
      h1 { margin-top: 0; }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        min-height: 220px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        padding: 12px;
        font-size: 14px;
        line-height: 1.6;
        resize: vertical;
      }
      .controls {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      #convertBtn { background: #2563eb; color: white; }
      #copyBtn { background: #0f766e; color: white; }
      #status {
        margin-top: 10px;
        min-height: 1.5em;
        color: #334155;
        font-size: 14px;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>add-weekday サンプル</h1>
      <p>
        npm パッケージ <code>add-weekday</code> を使って、日付に曜日を追加するデモです。
      </p>

      <div class="grid">
        <section>
          <label for="input">原文</label>
          <textarea id="input" placeholder="例: 会議は4/20と2026/04/22です"></textarea>
        </section>

        <section>
          <label for="output">追加後</label>
          <textarea id="output" readonly></textarea>
        </section>
      </div>

      <div class="controls">
        <button id="convertBtn" type="button">曜日追加</button>
        <button id="copyBtn" type="button">コピー</button>
      </div>

      <p id="status" aria-live="polite"></p>
      <p class="hint">※ すでに曜日付きの日付は上書きしません。</p>
    </main>

    <script type="module">
      import { addWeekday } from "https://esm.sh/add-weekday";

      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");
      const convertBtn = document.getElementById("convertBtn");
      const copyBtn = document.getElementById("copyBtn");
      const statusEl = document.getElementById("status");

      const setStatus = (message) => {
        statusEl.textContent = message;
      };

      convertBtn.addEventListener("click", () => {
        const source = inputEl.value;
        const converted = addWeekday(source);
        outputEl.value = converted;
        setStatus("曜日を追加しました。");
      });

      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          setStatus("追加後テキストをコピーしました。");
        } catch {
          setStatus("コピーに失敗しました。ブラウザ権限を確認してください。");
        }
      });
    </script>
  </body>
</html>
